databases:
  - name: huanhuan-db
    plan: free
    databaseName: huanhuan
    user: huanhuan

services:
  - type: web
    name: huanhuan-api
    runtime: node
    plan: free
    rootDir: packages/server
    buildCommand: npm install && npx prisma generate
    startCommand: npx prisma db push --skip-generate && if [ "$RUN_SEED" = "true" ]; then npx tsx prisma/seed.ts; fi && npx tsx src/index.ts
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: huanhuan-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: RUN_SEED
        value: "true"
